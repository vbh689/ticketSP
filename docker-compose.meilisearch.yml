services:
  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: ticketsp-meilisearch
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-ticketsp-master-key}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  meilisearch_data:
